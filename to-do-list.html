<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Todo Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Theme Variables --- */
        :root[data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        :root[data-theme="cyberpunk"] {
            --bg-gradient: linear-gradient(135deg, #050515 0%, #120024 100%);
            --card-bg: rgba(20, 0, 40, 0.6);
            --text-main: #00ffcc;
            --text-muted: #ff007f;
            --accent: #ff007f;
            --accent-hover: #d4006b;
            --border: rgba(0, 255, 204, 0.2);
            --shadow: 0 0 20px rgba(255, 0, 127, 0.2);
        }

        :root[data-theme="sunset"] {
            --bg-gradient: linear-gradient(135deg, #2e0854 0%, #fd5e53 100%);
            --card-bg: rgba(46, 8, 84, 0.5);
            --text-main: #fff;
            --text-muted: #ffcaa6;
            --accent: #ffaa44;
            --accent-hover: #e69535;
            --border: rgba(255, 255, 255, 0.15);
            --shadow: 0 8px 32px 0 rgba(253, 94, 83, 0.2);
        }

        /* --- Base Layout --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            transition: background 0.4s ease, color 0.3s ease;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .todo-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            padding: 30px;
            color: var(--text-main);
        }

        /* --- Header & Themes --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .theme-selector {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-btn:hover, .theme-btn.active {
            background: var(--accent);
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 12px var(--accent);
        }

        /* --- Form Input --- */
        #todo-form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        #todo-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        #todo-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        #todo-input::placeholder {
            color: var(--text-muted);
        }

        #add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        #add-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* --- Filters --- */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            position: relative;
        }

        .filter-btn.active {
            color: var(--text-main);
        }

        .filter-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 12px;
            right: 12px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* --- Todo List & Items --- */
        #todo-list {
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        #todo-list::-webkit-scrollbar {
            width: 6px;
        }
        #todo-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease forwards;
            transform-origin: top;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .todo-item.completed {
            background: rgba(0, 0, 0, 0.1);
            opacity: 0.7;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .check-btn {
            background: transparent;
            border: 2px solid var(--text-muted);
            width: 20px;
            height: 20px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }

        .todo-item.completed .check-btn {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .todo-text {
            font-size: 1rem;
            word-break: break-all;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .todo-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #ef4444;
            transform: scale(1.1);
        }

        .todo-item.fall {
            animation: fallOut 0.3s ease forwards;
        }

        @keyframes fallOut {
            to { opacity: 0; transform: translateX(30px) scale(0.9); }
        }

        /* --- Footer --- */
        .todo-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        #clear-completed {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
        }

        #clear-completed:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <header>
            <h1>Task Flow</h1>
            <div class="theme-selector">
                <button class="theme-btn active" data-theme="dark" title="Modern Dark"><i class="fas fa-moon"></i></button>
                <button class="theme-btn" data-theme="cyberpunk" title="Neon Cyberpunk"><i class="fas fa-bolt"></i></button>
                <button class="theme-btn" data-theme="sunset" title="Sunset Glow"><i class="fas fa-sun"></i></button>
            </div>
        </header>

        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="What needs to be done?" required autocomplete="off">
            <button type="submit" id="add-btn"><i class="fas fa-plus"></i></button>
        </form>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todo-list"></ul>

        <footer class="todo-footer">
            <span id="items-left">0 tasks left</span>
            <button id="clear-completed">Clear Completed</button>
        </footer>
    </div>

    <script>
        // DOM Elements
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const themeBtns = document.querySelectorAll('.theme-btn');
        const itemsLeft = document.getElementById('items-left');
        const clearCompletedBtn = document.getElementById('clear-completed');

        // Application State
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let currentFilter = 'all';

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderTodos();
            setupTheme();
        });

        // Theme Logic
        themeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                themeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const theme = btn.getAttribute('data-theme');
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('selected-theme', theme);
            });
        });

        function setupTheme() {
            const savedTheme = localStorage.getItem('selected-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeBtns.forEach(btn => {
                if(btn.getAttribute('data-theme') === savedTheme) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Add Todo
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const taskText = todoInput.value.trim();
            if (!taskText) return;

            const newTodo = {
                id: Date.now(),
                text: taskText,
                completed: false
            };

            todos.push(newTodo);
            saveAndRender();
            todoInput.value = '';
        });

        // Handle List Click Events (Complete & Delete)
        todoList.addEventListener('click', (e) => {
            const target = e.target;
            const todoItem = target.closest('.todo-item');
            if (!todoItem) return;
            
            const id = parseInt(todoItem.dataset.id);

            // Toggle Complete
            if (target.closest('.check-btn')) {
                todos = todos.map(todo => todo.id === id ? { ...todo, completed: !todo.completed } : todo);
                saveAndRender();
            }

            // Delete Item
            if (target.closest('.delete-btn')) {
                todoItem.classList.add('fall');
                todoItem.addEventListener('animationend', () => {
                    todos = todos.filter(todo => todo.id !== id);
                    saveAndRender();
                });
            }
        });

        // Filters
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                renderTodos();
            });
        });

        // Clear Completed
        clearCompletedBtn.addEventListener('click', () => {
            todos = todos.filter(todo => !todo.completed);
            saveAndRender();
        });

        // Helper Functions
        function saveAndRender() {
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();
        }

        function renderTodos() {
            todoList.innerHTML = '';
            
            let filteredTodos = todos;
            if (currentFilter === 'pending') filteredTodos = todos.filter(t => !t.completed);
            if (currentFilter === 'completed') filteredTodos = todos.filter(t => t.completed);

            filteredTodos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.dataset.id = todo.id;

                li.innerHTML = `
                    <div class="todo-left">
                        <button class="check-btn">
                            <i class="fas fa-check"></i>
                        </button>
                        <span class="todo-text">${escapeHTML(todo.text)}</span>
                    </div>
                    <button class="delete-btn">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                todoList.appendChild(li);
            });

            const activeCount = todos.filter(t => !t.completed).length;
            itemsLeft.textContent = `${activeCount} task${activeCount !== 1 ? 's' : ''} left`;
        }

        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
